<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess the Parent - Baby Animal Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f0f8ff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            margin-bottom: 10px;
            color: #2c3e50;
        }
        #game-container {
            max-width: 900px;
            width: 100%;
        }
        #image-container {
            width: 800px;
            height: 800px;
            position: relative;
            border: 4px solid #333;
            margin: 20px auto;
            overflow: hidden;
            background: #fff;
        }
        .parent {
            position: absolute;
            top: 0;
            width: 400px;
            height: 800px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .parent:hover {
            transform: scale(1.04);
        }
        #parent-left {
            left: 0;
        }
        #parent-right {
            right: 0;
        }
        .parent img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #baby-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            border: 8px solid white;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 0 25px rgba(0,0,0,0.7);
            z-index: 10;
            pointer-events: none;
        }
        #baby {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #feedback {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 52px;
            font-weight: bold;
            text-shadow: 3px 3px 10px rgba(0,0,0,0.5);
            z-index: 20;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s;
        }
        #reveal-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            z-index: 15;
        }
        #info {
            text-align: center;
            font-size: 24px;
            margin: 15px 0 10px;
        }
        #group-info {
            font-size: 28px;
            font-weight: bold;
            color: #d32f2f;
        }
        #group-scores {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 20px 0;
            font-size: 21px;
        }
        button {
            padding: 12px 28px;
            font-size: 18px;
            margin: 10px;
        }
    </style>
</head>
<body>
    <h1>Guess the Parent 🐾 Baby Animal Edition</h1>
    
    <div id="game-container">
        <div id="image-container">
            <!-- Left Parent -->
            <div id="parent-left" class="parent">
                <img id="left-img" src="" alt="Parent Left">
            </div>
            <!-- Right Parent -->
            <div id="parent-right" class="parent">
                <img id="right-img" src="" alt="Parent Right">
            </div>
            
            <!-- Baby in circle -->
            <div id="baby-container">
                <img id="baby" src="" alt="Baby Animal">
            </div>
            
            <!-- Feedback -->
            <div id="feedback"></div>
            
            <!-- Full Reveal -->
            <img id="reveal-image" src="" alt="Reveal Image">
        </div>

        <div id="info">
            <div id="group-info">Round <span id="round-num">1</span> — <span id="assigned-group">Group 1</span></div>
            <div>Which adult animal is the parent of this baby?</div>
        </div>

        <div id="group-scores">
            <div>Group 1: <span id="group1-score">0</span></div>
            <div>Group 2: <span id="group2-score">0</span></div>
            <div>Group 3: <span id="group3-score">0</span></div>
            <div>Group 4: <span id="group4-score">0</span></div>
        </div>

        <button id="wrong-btn">Wrong Answer — Next Round</button>
    </div>

    <script>
        // ====================== YOUR ROUNDS ======================
        // For each round, prepare 4 images:
        // correct-parent.jpg, wrong-parent.jpg, baby.jpg, reveal.jpg
        const questions = [
            {
                correct: "round1-correct.jpg",
                wrong:   "round1-wrong.jpg",
                baby:    "round1-baby.jpg",
                reveal:  "round1-reveal.jpg"
            },
            {
                correct: "round2-correct.jpg",
                wrong:   "round2-wrong.jpg",
                baby:    "round2-baby.jpg",
                reveal:  "round2-reveal.jpg"
            }
            // Add rounds 3 to 12 below (just copy the pattern)
        ];

        // Auto-fill remaining rounds up to 12 (change filenames as needed)
        for (let i = questions.length + 1; i <= 12; i++) {
            questions.push({
                correct: `round${i}-correct.jpg`,
                wrong:   `round${i}-wrong.jpg`,
                baby:    `round${i}-baby.jpg`,
                reveal:  `round${i}-reveal.jpg`
            });
        }

        let currentRound = 0;
        let groupScores = [0, 0, 0, 0]; // Group 1-4

        // DOM elements
        const leftContainer = document.getElementById('parent-left');
        const rightContainer = document.getElementById('parent-right');
        const leftImg = document.getElementById('left-img');
        const rightImg = document.getElementById('right-img');
        const babyImg = document.getElementById('baby');
        const revealImg = document.getElementById('reveal-image');
        const feedback = document.getElementById('feedback');
        const roundNumEl = document.getElementById('round-num');
        const assignedGroupEl = document.getElementById('assigned-group');
        const wrongBtn = document.getElementById('wrong-btn');

        function updateGroupScores() {
            for (let i = 1; i <= 4; i++) {
                document.getElementById(`group${i}-score`).textContent = groupScores[i-1];
            }
        }

        function getAssignedGroup(roundIndex) {
            return ((roundIndex % 4) || 4); // 1 → Group 1, 2 → Group 2, ..., 5 → Group 1
        }

        function loadRound() {
            if (currentRound >= questions.length) {
                const maxScore = Math.max(...groupScores);
                const winners = groupScores
                    .map((score, i) => ({group: i+1, score}))
                    .filter(item => item.score === maxScore)
                    .map(item => item.group);

                document.getElementById('info').innerHTML = `
                    <h2>Game Finished!</h2>
                    <p>${winners.length > 1 ? 'Winners' : 'Winner'}: Group${winners.length > 1 ? 's' : ''} 
                    ${winners.join(' & ')} with ${maxScore} points 🎉</p>
                `;
                leftContainer.style.pointerEvents = rightContainer.style.pointerEvents = 'none';
                wrongBtn.disabled = true;
                return;
            }

            const q = questions[currentRound];
            const assigned = getAssignedGroup(currentRound + 1);

            // Randomly decide which side gets the correct parent
            const correctOnLeft = Math.random() < 0.5;

            // Reset visuals
            revealImg.style.display = 'none';
            feedback.style.opacity = '0';
            leftContainer.style.pointerEvents = 'auto';
            rightContainer.style.pointerEvents = 'auto';

            // Assign images
            if (correctOnLeft) {
                leftImg.src = q.correct;
                rightImg.src = q.wrong;
            } else {
                leftImg.src = q.wrong;
                rightImg.src = q.correct;
            }

            babyImg.src = q.baby;
            revealImg.src = q.reveal;

            // Update round info
            roundNumEl.textContent = currentRound + 1;
            assignedGroupEl.textContent = `Group ${assigned}`;

            updateGroupScores();
        }

        function showFeedback(isCorrect) {
            feedback.textContent = isCorrect ? "✅ Correct!" : "❌ Not this one!";
            feedback.style.color = isCorrect ? "#2e7d32" : "#c62828";
            feedback.style.opacity = '1';
        }

        function handleClick(clickedLeft) {
            const q = questions[currentRound];
            const assignedIndex = getAssignedGroup(currentRound + 1) - 1; // 0-based

            // Check if the clicked side has the correct parent
            const correctOnLeft = leftImg.src.includes(q.correct); // simple check

            const isCorrect = clickedLeft === correctOnLeft;

            if (isCorrect) {
                groupScores[assignedIndex] += 100;
                showFeedback(true);
            } else {
                showFeedback(false);
            }

            updateGroupScores();

            // Show full reveal after a short delay
            setTimeout(() => {
                leftContainer.style.pointerEvents = 'none';
                rightContainer.style.pointerEvents = 'none';
                revealImg.style.display = 'block';

                setTimeout(() => {
                    currentRound++;
                    loadRound();
                }, 2800); // Show reveal for ~2.8 seconds
            }, 900);
        }

        // Event listeners
        leftContainer.addEventListener('click', () => handleClick(true));
        rightContainer.addEventListener('click', () => handleClick(false));

        wrongBtn.addEventListener('click', () => {
            currentRound++;
            loadRound();
        });

        // Start the game
        loadRound();
    </script>
</body>
</html>
