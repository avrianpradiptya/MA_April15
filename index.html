<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Who is My Parent?</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
        }
        #info-area {
            text-align: center;
            max-width: 800px;
            height: 100px;
            margin-bottom: 10px;
        }
        #explanation {
            font-size: 1.2rem;
            color: #2c3e50;
            font-weight: bold;
        }
        #game-container {
            position: relative;
            width: 800px;
            height: 800px;
            border: 5px solid #fff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            overflow: hidden;
            background-color: #ddd;
            cursor: pointer;
        }
        /* The two parent options */
        .option {
            position: absolute;
            top: 0;
            width: 400px;
            height: 800px;
            object-fit: cover;
            transition: filter 0.3s;
        }
        #opt-left { left: 0; }
        #opt-right { left: 400px; }
        
        /* The central baby image */
        #baby-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px; /* 150px radius */
            height: 300px;
            border-radius: 50%;
            border: 6px solid #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            object-fit: cover;
            z-index: 10;
        }
        /* Full reveal overlay */
        #reveal-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 800px;
            height: 800px;
            object-fit: cover;
            z-index: 20;
            display: none;
        }
        #score-board {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .group-card {
            padding: 10px 20px;
            background: white;
            border-radius: 8px;
            text-align: center;
            border-bottom: 4px solid #ccc;
        }
        .active-group {
            border-color: #3498db;
            background: #e1f5fe;
            transform: scale(1.1);
        }
        .btn-next {
            margin-top: 15px;
            padding: 10px 25px;
            font-size: 18px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            display: none;
        }
        #final-msg {
            display: none;
            font-size: 48px;
            color: #2c3e50;
            text-align: center;
            margin-top: 100px;
        }
    </style>
</head>
<body>

    <h1>Who is my Parent?</h1>
    
    <div id="info-area">
        <h2 id="turn-display">Group 1's Turn</h2>
        <p id="explanation">Look at the baby in the center. Who is the parent? Click the Left or Right image!</p>
    </div>

    <div id="game-container">
        <img id="opt-left" class="option" src="" onclick="makeChoice('left')">
        <img id="opt-right" class="option" src="" onclick="makeChoice('right')">
        <img id="baby-circle" src="">
        <img id="reveal-img" src="">
    </div>

    <button id="next-btn" class="btn-next" onclick="nextRound()">Next Round</button>

    <div id="score-board">
        <div id="g1-card" class="group-card active-group">Group 1<br><b id="s1">0</b></div>
        <div id="g2-card" class="group-card">Group 2<br><b id="s2">0</b></div>
        <div id="g3-card" class="group-card">Group 3<br><b id="s3">0</b></div>
        <div id="g4-card" class="group-card">Group 4<br><b id="s4">0</b></div>
    </div>

    <div id="final-msg">
        GAME FINISHED!<br>Thanks for playing.
    </div>

    <script>
        // CONFIGURATION: Add your images and facts here
        const rounds = [
            { baby: 'baby1.jpg', parent: 'parent1.jpg', wrong: 'wrong1.jpg', reveal: 'reveal1.jpg', fact: 'This is Malayan tapir. Can also be found in Indonesia.' },
            { baby: 'baby2.jpg', parent: 'parent2.jpg', wrong: 'wrong2.jpg', reveal: 'reveal2.jpg', fact: 'African Bullfrog is ferocious, it will eat anything.' },
            { baby: 'baby3.jpg', parent: 'parent3.jpg', wrong: 'wrong3.jpg', reveal: 'reveal3.jpg', fact: 'Silk came from silk moth cocoons. A butterfly will emerge from a chrysalis instead.' },
            { baby: 'baby4.jpg', parent: 'parent4.jpg', wrong: 'wrong4.jpg', reveal: 'reveal4.jpg', fact: 'When a peacock mate with peahen, the resulting offspring is called a peachick.' },
            { baby: 'baby5.jpg', parent: 'parent5.jpg', wrong: 'wrong5.jpg', reveal: 'reveal5.jpg', fact: 'This is the picture of Nubian goat with her kid. Young sheep is called a lamb while a young goat is called a kid.' },
            { baby: 'baby6.jpg', parent: 'parent6.jpg', wrong: 'wrong6.jpg', reveal: 'reveal6.jpg', fact: 'Young swan is called a cygnet. In this picture you can see a Mute swan with her cygnet.' },
            { baby: 'baby7.jpg', parent: 'parent7.jpg', wrong: 'wrong7.jpg', reveal: 'reveal7.jpg', fact: 'Ladybugs are beneficial insects that feed on aphids and other small pests.' },
            { baby: 'baby8.jpg', parent: 'parent8.jpg', wrong: 'wrong8.jpg', reveal: 'reveal8.jpg', fact: 'Yak is a large bovine animal that lives in the Himalayas. They are highly adapted to cold climates.' },
            { baby: 'baby9.jpg', parent: 'parent9.jpg', wrong: 'wrong9.jpg', reveal: 'reveal9.jpg', fact: 'Kangaroo joey born very early in their development. That is why their mother carries them in a pouch.' },
            { baby: 'baby10.jpg', parent: 'parent10.jpg', wrong: 'wrong10.jpg', reveal: 'reveal10.jpg', fact: 'There are several breed of hairless cat. The one in the picture is a Sphynx cat.' },
            { baby: 'baby11.jpg', parent: 'parent11.jpg', wrong: 'wrong11.jpg', reveal: 'reveal11.jpg', fact: 'Emperor penguin is the largest penguin species. Their baby is covered in down feathers to keep them warm.' },
            { baby: 'baby12.jpg', parent: 'parent12.jpg', wrong: 'wrong12.jpg', reveal: 'reveal12.jpg', fact: 'Capybara captivate the internet with their cool and careless attitude.' },


            // ... Add up to 12 or more
        ];

        let currentRoundIdx = 0;
        let scores = [0, 0, 0, 0];
        let currentGroup = 0; // 0=G1, 1=G2...
        let correctSide = ''; 

        function setupRound() {
            if (currentRoundIdx >= rounds.length) {
                document.getElementById('game-container').style.display = 'none';
                document.getElementById('info-area').style.display = 'none';
                document.getElementById('next-btn').style.display = 'none';
                document.getElementById('final-msg').style.display = 'block';
                return;
            }

            const data = rounds[currentRoundIdx];
            const isParentLeft = Math.random() > 0.5;
            correctSide = isParentLeft ? 'left' : 'right';

            // Set images
            document.getElementById('opt-left').src = isParentLeft ? data.parent : data.wrong;
            document.getElementById('opt-right').src = isParentLeft ? data.wrong : data.parent;
            document.getElementById('baby-circle').src = data.baby;
            document.getElementById('reveal-img').src = data.reveal;
            document.getElementById('reveal-img').style.display = 'none';
            
            // Reset UI
            document.getElementById('explanation').textContent = "Look at the baby in the center. Who is the parent?";
            document.getElementById('next-btn').style.display = 'none';
            updateTurnUI();
        }

        function makeChoice(side) {
            // Prevent clicking after choice is made
            if (document.getElementById('reveal-img').style.display === 'block') return;

            const data = rounds[currentRoundIdx];
            if (side === correctSide) {
                scores[currentGroup] += 100;
                document.getElementById('explanation').textContent = "CORRECT! " + data.fact;
                document.getElementById(`s${currentGroup + 1}`).textContent = scores[currentGroup];
            } else {
                document.getElementById('explanation').textContent = "WRONG! " + data.fact;
            }

            // Show final reveal image
            document.getElementById('reveal-img').style.display = 'block';
            document.getElementById('next-btn').style.display = 'inline-block';
        }

        function nextRound() {
            currentRoundIdx++;
            currentGroup = (currentGroup + 1) % 4;
            setupRound();
        }

        function updateTurnUI() {
            for (let i = 0; i < 4; i++) {
                document.getElementById(`g${i+1}-card`).classList.remove('active-group');
            }
            document.getElementById(`g${currentGroup+1}-card`).classList.add('active-group');
            document.getElementById('turn-display').textContent = `Group ${currentGroup + 1}'s Turn`;
        }

        // Initialize first round
        setupRound();
    </script>
</body>
</html>
